services:
  claude:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
      args:
        TZ: "Europe/Amsterdam"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - isolated-claude-config:/home/node/.claude
      - isolated-claude-history:/commandhistory
      - .:/workspace
    working_dir: /workspace
    environment:
      NODE_OPTIONS: "--max-old-space-size=4096"
      CLAUDE_CONFIG_DIR: /home/node/.claude
    user: node
    command: >
      bash -c "sudo /usr/local/bin/init-firewall.sh && claude"
    stdin_open: true
    tty: true

volumes:
  isolated-claude-config:
  isolated-claude-history:
